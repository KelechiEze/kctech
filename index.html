<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Web Design Agency | Shopify Development & Website Development | BizzJump</title>

    <meta
      name="description"
      content="BizzJump provides professional website development and digital solutions to help businesses launch, grow, and succeed online."
    />

    <meta
      name="keywords"
      content="BizzJump, BizzJump website development, web development services, business website, launch business online, digital solutions, website design"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://bizzjump.com/" />

    <!-- CRITICAL FIX: Favicon for Google Search Results -->
    <!-- Google recommends 16x16 or 32x32 for search results -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    
    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon.png" />

    <!-- Traditional browser fallback -->
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Apple devices -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Browser theme colour -->
    <meta name="theme-color" content="#d7fe03" />

    <!-- Open Graph: WhatsApp, Facebook and LinkedIn -->
    <meta
      property="og:title"
      content="BizzJump – Launch Your Business Online"
    />

    <meta
      property="og:description"
      content="Professional website development and digital solutions to help your business launch, grow, and succeed online."
    />

    <meta property="og:url" content="https://bizzjump.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BizzJump" />

    <meta
      property="og:image"
      content="https://bizzjump.com/bizzjump-social-preview.png"
    />

    <meta
      property="og:image:secure_url"
      content="https://bizzjump.com/bizzjump-social-preview.png"
    />

    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="BizzJump – Launch Your Business Online"
    />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="BizzJump – Launch Your Business Online"
    />

    <meta
      name="twitter:description"
      content="Professional website development and digital solutions to launch and grow your business online."
    />

    <meta
      name="twitter:image"
      content="https://bizzjump.com/bizzjump-social-preview.png"
    />

    <meta
      name="twitter:image:alt"
      content="BizzJump – Launch Your Business Online"
    />

    <!-- PWA Metadata -->
    <link rel="manifest" href="/metadata.json" />
    
    <meta name="application-name" content="BizzJump" />
    <meta name="apple-mobile-web-app-title" content="BizzJump" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
